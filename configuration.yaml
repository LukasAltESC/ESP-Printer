rest_command:
  notion_qr701_today_todos:
    url: "https://api.notion.com/v1/data_sources/{{ data_source_id }}/query"
    method: POST
    headers:
      Authorization: !secret notion_token
      Notion-Version: "2026-03-11"
      Content-Type: "application/json"
    payload: >
      {
        "filter": {
          "and": [
            {
              "property": "Date",
              "date": {
                "equals": "{{ now().strftime('%Y-%m-%d') }}"
              }
            },
            {
              "property": "Status",
              "checkbox": {
                "equals": false
              }
            }
          ]
        },
        "page_size": 50
      }

script:
  qr701_notion_daily_todo_test:
    alias: QR701 Notion Daily ToDo Test
    mode: single
    sequence:
      - action: rest_command.notion_qr701_today_todos
        data:
          data_source_id: !secret notion_data_source_id
        response_variable: notion_response

      - action: mqtt.publish
        data:
          topic: qr701/print/todo
          payload: >-
            #TITLE Daily ToDo
            {% if notion_response.status == 200 %}
            {% set items = notion_response.content.results %}
            {% if items | count > 0 %}
            {% for item in items %}
            {{ item.properties['Task Name'].title[0].plain_text }}
            {% endfor %}
            {% else %}
            Keine Aufgaben fuer heute.
            {% endif %}
            {% else %}
            Notion Fehler: {{ notion_response.status }}
            {% endif %}

            
