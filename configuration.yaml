rest_command:
  notion_qr701_todos_by_date:
    url: "https://api.notion.com/v1/data_sources/{{ data_source_id }}/query"
    method: POST
    headers:
      Authorization: !secret notion_token
      Notion-Version: "2026-03-11"
      Content-Type: "application/json"
    payload: >
      {
        "filter": {
          "and": [
            {
              "property": "Date",
              "date": {
                "equals": "{{ query_date }}"
              }
            }
            {% if not include_done | default(false) | bool %}
            ,
            {
              "property": "Status",
              "checkbox": {
                "equals": false
              }
            }
            {% endif %}
          ]
        },
        "page_size": 50
      }

script:
  qr701_notion_daily_todo_test:
    alias: QR701 Notion ToDo drucken
    mode: single

    fields:
      list_day:
        name: Liste
        description: Welche ToDo-Liste soll gedruckt werden?
        default: today
        selector:
          select:
            options:
              - label: Heute
                value: today
              - label: Morgen
                value: tomorrow

      include_done:
        name: Erledigte Aufgaben mitdrucken
        description: Wenn aktiv, werden auch Aufgaben mit aktivierter Status-Checkbox gedruckt.
        default: false
        selector:
          boolean:

    sequence:
      - variables:
          list_day_value: "{{ list_day | default('today') }}"
          include_done_value: "{{ include_done | default(false) | bool }}"
          offset_days: "{{ 1 if list_day_value == 'tomorrow' else 0 }}"
          target_ts: "{{ as_timestamp(now()) + ((1 if list_day_value == 'tomorrow' else 0) * 86400) }}"
          query_date: "{{ target_ts | timestamp_custom('%Y-%m-%d', true) }}"
          weekday_index: "{{ target_ts | timestamp_custom('%w', true) | int }}"
          weekday_name: >
            {{ ['Sonntag', 'Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag'][weekday_index | int] }}
          date_line: >
            {{ weekday_name }}, den {{ target_ts | timestamp_custom('%d.%m.%y', true) }}

      - action: rest_command.notion_qr701_todos_by_date
        data:
          data_source_id: !secret notion_data_source_id
          query_date: "{{ query_date }}"
          include_done: "{{ include_done_value }}"
        response_variable: notion_response

      - action: mqtt.publish
        data:
          topic: qr701/print/todo
          payload: |
            #TITLE Daily ToDo
            #PERSON Lukas Müller
            #DATE_LINE {{ date_line }}
            {% if notion_response.status == 200 %}
            {% set items = notion_response.content.results %}
            {% if items | count > 0 %}
            {% for item in items %}
            {% set done = item.properties['Status'].checkbox %}
            {% set title = item.properties['Task Name'].title[0].plain_text %}
            {% if done %}
            [x] {{ title }}
            {% else %}
            {{ title }}
            {% endif %}
            {% endfor %}
            {% else %}
            Keine Aufgaben fuer diesen Tag.
            {% endif %}
            {% else %}
            Notion Fehler: {{ notion_response.status }}
            {% endif %}
